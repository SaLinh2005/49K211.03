<script>

  const key = "unimentor_auth";

  /* Lấy dữ liệu login */
  const authLocal = localStorage.getItem(key);
  const authSession = sessionStorage.getItem(key);

  const auth = JSON.parse(authLocal || authSession || "null");

  const welcome = document.getElementById("welcome");

  /* Kiểm tra login */
  if (!auth || !auth.email) {
    window.location.href = "login.html";
  }

  /* Hiển thị email */
  welcome.textContent = `Chào mừng, ${auth.email}`;

  /* Logout */
  document.getElementById("logout").addEventListener("click", () => {

    localStorage.removeItem(key);
    sessionStorage.removeItem(key);

    window.location.href = "login.html";

  });

</script>
